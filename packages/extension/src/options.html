<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bePresent Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="noise"></div>

    <div class="container">
      <!-- Header -->
      <header>
        <div class="brand">
          <div class="logo-mark">
            <img src="icon-48.png" alt="bePresent" width="32" height="32" style="border-radius:8px;" />
          </div>
          <div class="brand-text">
            <h1>bePresent</h1>
            <span class="version">v0.0.1</span>
          </div>
        </div>

        <div class="status-badge" id="status-badge">
          <span class="status-indicator" id="status-indicator"></span>
          <span id="status-text">Loading...</span>
        </div>
      </header>

      <!-- Main Content -->
      <main>
        <!-- Toggle Card -->
        <section class="toggle-section">
          <div class="section-header">
            <div class="section-title">
              <h2>Block Feeds</h2>
              <p class="section-desc">Block Instagram reels and X feed when enabled</p>
            </div>
            <button class="power-btn" id="power-btn">
              <span id="power-label">Off</span>
              <span class="power-track" id="power-track">
                <span class="power-thumb" id="power-thumb"></span>
              </span>
            </button>
          </div>
        </section>

        <!-- Bypass Section -->
        <section class="bypass-section">
          <div class="section-header">
            <div class="section-title">
              <h2>Emergency Bypass</h2>
              <p class="section-desc">Get 5 minutes of unblocked access (once per day)</p>
            </div>
          </div>

          <button class="bypass-btn" id="bypass-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12,6 12,12 16,14"/>
            </svg>
            <span id="bypass-text">Activate Bypass</span>
          </button>
          <p class="bypass-status" id="bypass-status">Loading...</p>
        </section>
      </main>

      <!-- Footer -->
      <footer>
        <p>Stay present. Block the scroll.</p>
      </footer>
    </div>

    <script src="options.global.js"></script>
  </body>
</html>
