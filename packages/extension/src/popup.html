<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bePresent</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img class="logo" src="icon-48.png" alt="bePresent" />
        <span class="title">bePresent</span>
      </div>

      <button class="toggle-btn" id="toggle-btn">
        <span class="toggle-label" id="toggle-label">Off</span>
        <span class="toggle-track" id="toggle-track">
          <span class="toggle-thumb" id="toggle-thumb"></span>
        </span>
      </button>

      <div class="status-text" id="status-text">Feeds are allowed</div>

      <button class="settings-btn" id="settings-btn">
        Settings
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9,18 15,12 9,6"/>
        </svg>
      </button>
    </div>

    <script src="popup.global.js"></script>
  </body>
</html>
